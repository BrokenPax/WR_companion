<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<meta name="theme-color" content="#18213a" />
<title>The Weimar Republic Companion</title>
<link rel="manifest" href="manifest.json" />
<style>
:root{--bg:#f6f2ea;--card:#fffdf8;--ink:#1d2430;--muted:#657080;--line:#ddd3c2;--blue:#18213a;--red:#9f3434;--gold:#d8a540;--green:#2f6f5e}
*{box-sizing:border-box}
body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;background:var(--bg);color:var(--ink)}
.app{width:100%;max-width:760px;margin:0 auto;min-height:100vh;padding-bottom:26px}
.top{position:sticky;top:0;z-index:10;background:rgba(246,242,234,.94);backdrop-filter:blur(10px);border-bottom:1px solid var(--line)}
.topin{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:12px 16px}
.iconbtn{border:1px solid transparent;background:transparent;color:var(--ink);font-size:20px;padding:8px 10px;border-radius:8px}
.title{font-size:14px;font-weight:850;letter-spacing:.02em;text-transform:uppercase}
.wrap{padding:16px}
.hero,.panel,.card{background:var(--card);border:1px solid var(--line);border-radius:8px;box-shadow:0 2px 12px rgba(29,36,48,.08)}
.hero{display:flex;align-items:flex-start;justify-content:space-between;gap:14px;padding:20px;margin-bottom:14px;border-top:5px solid var(--blue)}
.panel{padding:16px;margin-bottom:14px}
.card{padding:15px}
.row,.section-head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
.section-head{margin-bottom:12px}
h1,h2,h3,p{margin:0}
h1{font-size:30px;line-height:1.05;letter-spacing:0;margin-top:4px}
h2{font-size:20px;line-height:1.1}
h3{font-size:17px;line-height:1.15}
.hero p,.muted{color:var(--muted);font-size:14px;line-height:1.4;margin-top:8px}
.kicker{font-size:12px;font-weight:900;letter-spacing:.08em;text-transform:uppercase;color:var(--red)}
.badge{display:inline-flex;align-items:center;min-height:26px;border-radius:999px;background:#efe7d7;color:var(--ink);padding:4px 10px;font-size:12px;font-weight:850;white-space:nowrap}
.badge.good{background:#dceee7;color:#1f584b}
.badge.warn{background:#f8e8bf;color:#7a4d00}
.badge.dark{background:var(--blue);color:white}
.grid2{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}
.source-grid{display:grid;gap:12px}
.source-card{width:100%;border:1px solid var(--line);background:#fffaf0;border-radius:8px;padding:14px;text-align:left;color:var(--ink)}
.source-card.selected{border-color:var(--blue);box-shadow:0 0 0 2px rgba(24,33,58,.12)}
.source-title{font-size:17px;font-weight:900}
.btn,.link-btn,.full-link{border:1px solid var(--line);background:white;color:var(--ink);border-radius:8px;min-height:48px;padding:12px 14px;font:inherit;font-weight:800;text-align:left;text-decoration:none}
.btn{width:100%}
.btn.primary{background:var(--blue);border-color:var(--blue);color:white}
.btn.secondary{background:#eef1f7;border-color:#c9d2e2}
.link-btn{display:inline-flex;align-items:center;min-height:40px;background:var(--blue);border-color:var(--blue);color:white}
.full-link{display:block;margin-top:14px}
.checklist{display:grid;gap:8px}
.check-row{display:flex;align-items:center;gap:10px;border:1px solid var(--line);border-radius:8px;padding:10px;background:#fffaf0}
.check-row.done{background:#f0f7f3;border-color:#c7dfd3}
.check-dot{display:inline-flex;align-items:center;justify-content:center;width:36px;height:26px;border-radius:999px;background:#e6dece;font-size:11px;font-weight:900}
.check-row.done .check-dot{background:var(--green);color:white}
textarea{width:100%;min-height:150px;border:1px solid var(--line);border-radius:8px;background:white;color:var(--ink);padding:12px;font:inherit;resize:vertical}
.save-note{margin:12px 0}
.sticky-actions{position:sticky;bottom:10px;z-index:8;display:grid;grid-template-columns:1fr 1fr;gap:10px;background:rgba(246,242,234,.92);backdrop-filter:blur(8px);border:1px solid var(--line);border-radius:8px;padding:10px;box-shadow:0 6px 18px rgba(29,36,48,.14)}
.result{border-top:5px solid var(--green)}
@media (max-width:560px){
  .wrap{padding:12px}
  .hero{display:block;padding:16px}
  h1{font-size:25px}
  .grid2,.sticky-actions{grid-template-columns:1fr}
  .section-head{display:block}
  .link-btn{margin-top:10px;width:100%}
}
</style>
</head>
<body>
<div class="app">
  <div class="top"><div class="topin">
    <button class="iconbtn" id="backBtn" aria-label="Back">&lt;</button>
    <div class="title">The Weimar Republic Companion</div>
    <button class="iconbtn" id="resetBtn" aria-label="Reset">R</button>
  </div></div>
  <main class="wrap" id="app"></main>
</div>
<script src="app.js"></script>
</body>
</html>
