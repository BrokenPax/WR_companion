<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<meta name="theme-color" content="#18213a" />
<title>The Weimar Republic Companion</title>
<link rel="manifest" href="manifest.json" />
<style>
:root{--bg:#f6f2ea;--card:#fffdf8;--ink:#1d2430;--muted:#657080;--line:#ddd3c2;--blue:#18213a;--red:#9f3434;--gold:#d8a540;--green:#2f6f5e}
*{box-sizing:border-box}
body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;background:var(--bg);color:var(--ink)}
.app{width:100%;max-width:430px;margin:0 auto;min-height:100vh;padding-bottom:26px}
.top{position:sticky;top:0;z-index:10;background:rgba(246,242,234,.94);backdrop-filter:blur(10px);border-bottom:1px solid var(--line)}
.topin{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:12px 16px}
.iconbtn{border:1px solid transparent;background:transparent;color:var(--ink);font-size:20px;padding:8px 10px;border-radius:8px}
.title{font-size:14px;font-weight:850;letter-spacing:.02em;text-transform:uppercase}
.wrap{padding:16px}
.hero,.panel,.card{background:var(--card);border:1px solid var(--line);border-radius:8px;box-shadow:0 2px 12px rgba(29,36,48,.08)}
.hero{display:flex;align-items:flex-start;justify-content:space-between;gap:14px;padding:20px;margin-bottom:14px;border-top:5px solid var(--blue)}
.hero.coalition{border-top-color:var(--gold)}
.hero.kpd{border-top-color:#b32626}
.hero.nsdap{border-top-color:#6f4a2f}
.hero.radcon{border-top-color:#222}
.panel{padding:16px;margin-bottom:14px}
.card{padding:15px}
.row,.section-head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
.section-head{margin-bottom:12px}
h1,h2,h3,p{margin:0}
h1{font-size:30px;line-height:1.05;letter-spacing:0;margin-top:4px}
h2{font-size:20px;line-height:1.1}
h3{font-size:17px;line-height:1.15}
.hero p,.muted{color:var(--muted);font-size:14px;line-height:1.4;margin-top:8px}
.kicker{font-size:12px;font-weight:900;letter-spacing:.08em;text-transform:uppercase;color:var(--red)}
.badge{display:inline-flex;align-items:center;min-height:26px;border-radius:999px;background:#efe7d7;color:var(--ink);padding:4px 10px;font-size:12px;font-weight:850;white-space:nowrap}
.badge-stack{display:flex;flex-wrap:wrap;justify-content:flex-end;gap:8px}
.badge.good{background:#dceee7;color:#1f584b}
.badge.warn{background:#f8e8bf;color:#7a4d00}
.badge.dark{background:var(--blue);color:white}
.badge.ready{background:#dceee7;color:#1f584b}
.badge.check{background:#f8e8bf;color:#7a4d00}
.badge.blocked{background:#f3d2d2;color:#7f1d1d}
.badge.coalition{background:#f7e7ad;color:#5f4200}
.badge.kpd{background:#f5c7c7;color:#7f1d1d}
.badge.nsdap{background:#ead7c5;color:#5c3926}
.badge.radcon{background:#d9d9d9;color:#1f2937}
.grid2{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}
.grid4{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px}
.source-grid{display:grid;gap:12px}
.source-card{width:100%;border:1px solid var(--line);background:#fffaf0;border-radius:8px;padding:14px;text-align:left;color:var(--ink)}
.source-card.selected{border-color:var(--blue);box-shadow:0 0 0 2px rgba(24,33,58,.12)}
.source-title{font-size:17px;font-weight:900}
.btn,.link-btn,.full-link{border:1px solid var(--line);background:white;color:var(--ink);border-radius:8px;min-height:48px;padding:12px 14px;font:inherit;font-weight:800;text-align:left;text-decoration:none}
.btn{width:100%}
.btn.primary{background:var(--blue);border-color:var(--blue);color:white}
.btn.secondary{background:#eef1f7;border-color:#c9d2e2}
.btn:disabled{opacity:.48;cursor:not-allowed}
.link-btn{display:inline-flex;align-items:center;min-height:40px;background:var(--blue);border-color:var(--blue);color:white}
.full-link{display:block;margin-top:14px}
.check-dot{display:inline-flex;align-items:center;justify-content:center;width:36px;height:26px;border-radius:999px;background:#e6dece;font-size:11px;font-weight:900}
textarea{width:100%;min-height:150px;border:1px solid var(--line);border-radius:8px;background:white;color:var(--ink);padding:12px;font:inherit;resize:vertical}
.text-input{width:100%;min-height:46px;border:1px solid var(--line);border-radius:8px;background:white;color:var(--ink);padding:10px 12px;font:inherit;margin-bottom:12px}
.timeline{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:8px;margin-bottom:12px}
.year,.mini-btn,.faction-tab{border:1px solid var(--line);border-radius:8px;background:white;color:var(--ink);font:inherit;font-weight:850}
.year{min-height:38px}
.year.selected{background:var(--blue);border-color:var(--blue);color:white}
.round-controls{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.step-list{display:grid;gap:8px}
.step-row{display:grid;grid-template-columns:1fr auto;gap:8px;align-items:center;border:1px solid var(--line);border-radius:8px;background:#fffaf0;padding:8px}
.step-row.current{box-shadow:0 0 0 2px rgba(24,33,58,.12);border-color:var(--blue)}
.step-row.done{background:#f0f7f3;border-color:#c7dfd3}
.step-row.done .check-dot{background:var(--green);color:white}
.step-main{display:flex;align-items:center;gap:10px;border:0;background:transparent;color:var(--ink);font:inherit;font-weight:850;text-align:left}
.mini-btn{min-height:34px;padding:6px 10px}
.mini-btn.selected{background:var(--blue);border-color:var(--blue);color:white}
.mini-btn:disabled{opacity:.48;cursor:not-allowed}
.progress-strip{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:8px;margin:12px 0 16px}
.phase-dot{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;min-height:42px;border:1px solid var(--line);border-radius:8px;background:white;color:var(--muted);font:inherit;font-weight:900;text-align:center}
.phase-dot small{font-size:10px;line-height:1.05;font-weight:800}
.phase-dot.active{background:var(--blue);border-color:var(--blue);color:white}
.phase-dot.done{background:#dceee7;border-color:#b6d7c9;color:#1f584b}
.walk-block{margin-top:14px}
.turn-page-head{margin:8px 0 12px}
.turn-page-head h2{font-size:22px}
.runner-page{display:grid;gap:12px}
.runner-toolbar{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:10px 0}
.runner-toolbar .btn{min-height:38px;padding:8px 10px;text-align:center}
.blocked-note{color:#7f1d1d}
.field-label{font-size:12px;font-weight:900;letter-spacing:.06em;text-transform:uppercase;color:var(--red);margin-bottom:8px}
.question-stack{display:grid;gap:10px;margin:14px 0}
.mobile-turn-summary{position:sticky;top:57px;z-index:7;display:flex;align-items:center;justify-content:space-between;gap:10px;border:1px solid var(--line);border-radius:8px;background:rgba(255,253,248,.96);backdrop-filter:blur(8px);padding:10px 12px;box-shadow:0 5px 16px rgba(29,36,48,.12)}
.summary-main{font-weight:950;line-height:1.15}
.summary-sub{color:var(--muted);font-size:12px;line-height:1.25;margin-top:3px}
.mobile-setup,.mobile-action-picker{display:none}
.mobile-action-picker.always-show{display:block}
.compact-details{border:1px solid var(--line);border-radius:8px;background:#fffaf0;margin-top:14px;padding:0 12px}
.compact-details summary,.mobile-setup summary{min-height:46px;display:flex;align-items:center;font-weight:900;cursor:pointer}
.compact-details[open]{padding-bottom:12px}
.question-card{border:1px solid var(--line);border-radius:8px;background:#fffaf0;padding:12px}
.turn-order-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px}
.turn-order-item{display:grid;grid-template-columns:auto 1fr;gap:8px;align-items:center;border:1px solid var(--line);border-radius:8px;background:white;padding:8px}
.turn-order-item .mini-btn{grid-column:1 / -1}
.turn-order-item.active{border-color:var(--blue);box-shadow:0 0 0 2px rgba(24,33,58,.12)}
.turn-order-item.complete{background:#f0f7f3;border-color:#c7dfd3}
.turn-order-label{display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:999px;background:#efe7d7;font-weight:900}
.turn-rail{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px;margin:10px 0}
.turn-rail-item{display:flex;align-items:center;gap:8px;border:1px solid var(--line);border-radius:8px;background:#fffaf0;padding:8px;min-width:0}
.turn-rail-item strong,.turn-rail-item small{display:block;line-height:1.1}
.turn-rail-item small{color:var(--muted);font-size:11px;margin-top:3px}
.turn-rail-item.active{background:#eef1f7;border-color:var(--blue);box-shadow:0 0 0 2px rgba(24,33,58,.12)}
.turn-rail-item.complete{background:#f0f7f3;border-color:#c7dfd3}
.board-summary-line{display:flex;gap:6px;overflow:auto;padding-bottom:2px}
.board-summary-line span{flex:0 0 auto;border:1px solid var(--line);border-radius:999px;background:#fffaf0;padding:6px 9px;font-size:12px;font-weight:850;color:var(--muted)}
.select-input{width:100%;min-height:36px;border:1px solid var(--line);border-radius:8px;background:white;color:var(--ink);padding:6px 8px;font:inherit;font-weight:850}
.option-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}
.option-card{display:flex;flex-direction:column;gap:6px;min-height:86px;border:1px solid var(--line);border-radius:8px;background:#fffaf0;color:var(--ink);padding:12px;text-align:left;font:inherit}
.option-card.selected{background:#eef1f7;border-color:var(--blue);box-shadow:0 0 0 2px rgba(24,33,58,.12)}
.option-title{font-weight:900;line-height:1.15}
.option-detail{color:var(--muted);font-size:13px;line-height:1.35}
.check-list{display:grid;gap:8px}
.check-item{display:flex;align-items:center;gap:10px;min-height:44px;border:1px solid var(--line);border-radius:8px;background:#fffaf0;color:var(--ink);padding:8px 10px;font:inherit;font-weight:800;text-align:left}
.check-item.done{background:#f0f7f3;border-color:#c7dfd3}
.check-item.done .check-dot{background:var(--green);color:white}
.bot-step-strip{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:6px;margin:8px 0 10px}
.bot-step{display:flex;align-items:center;gap:6px;border:1px solid var(--line);border-radius:8px;background:#fffaf0;padding:7px;font-size:12px;font-weight:850;line-height:1.15}
.bot-step.current{background:#eef1f7;border-color:var(--blue)}
.bot-step.done{background:#f0f7f3;border-color:#c7dfd3}
.bot-step.done .check-dot{background:var(--green);color:white}
.info-band{border:1px solid #c9d2e2;border-left:5px solid var(--blue);border-radius:8px;background:#eef1f7;padding:12px;color:var(--ink);line-height:1.4}
.sequence-actions{margin-top:16px}
.action-slots{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}
.action-slot{display:flex;align-items:center;gap:10px;min-height:54px;border:1px dashed var(--line);border-radius:8px;background:white;color:var(--ink);padding:10px;text-align:left;font:inherit;font-weight:850}
.action-slot.ready{border-style:solid;background:#f0f7f3;border-color:#b6d7c9}
.action-slot.check{border-style:solid;background:#fff8e8;border-color:#e8c771}
.action-slot.blocked{border-style:solid;background:#fff0f0;border-color:#ddb2b2}
.slot-number{display:inline-flex;align-items:center;justify-content:center;flex:0 0 auto;width:28px;height:28px;border-radius:999px;background:#efe7d7;font-size:13px;font-weight:900}
.context-grid,.action-card-grid,.board-state-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}
.board-state-grid .wide{grid-column:1 / -1}
.compact-input{margin-bottom:0}
.compact-action-list{display:grid;gap:6px}
.compact-action{display:grid;grid-template-columns:1fr auto;align-items:center;gap:8px;min-height:42px;border:1px solid var(--line);border-radius:8px;background:white;color:var(--ink);padding:8px 10px;text-align:left;font:inherit;font-size:13px;font-weight:900}
.compact-action small{display:block;color:var(--muted);font-size:11px;font-weight:800;margin-top:2px}
.compact-action.selected{border-color:var(--blue);box-shadow:0 0 0 2px rgba(24,33,58,.12)}
.compact-action.ready{background:#f6fbf8}
.compact-action.check{background:#fffaf0}
.compact-action.blocked{background:#fff4f4;opacity:.78}
.compact-action:disabled{cursor:not-allowed}
.controller-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px}
.controller-item{border:1px solid var(--line);border-radius:8px;background:#fffaf0;padding:10px}
.controller-title{font-size:13px;font-weight:900;margin-bottom:8px}
.controller-item .segmented{grid-template-columns:1fr 1fr}
.context-item{border:1px solid var(--line);border-radius:8px;background:#fffaf0;padding:10px}
.context-label{font-size:13px;line-height:1.3;font-weight:850;margin-bottom:8px}
.segmented{display:grid;grid-template-columns:1fr 1fr 42px;gap:6px}
.segmented.two{grid-template-columns:1fr 1fr}
.segmented button{border:1px solid var(--line);border-radius:8px;background:white;min-height:34px;font:inherit;font-weight:850}
.segmented button.selected{background:var(--blue);border-color:var(--blue);color:white}
.segmented button.danger{background:var(--red);border-color:var(--red)}
.segmented button.muted-choice{background:#e6dece;border-color:#d0c4b1;color:var(--ink)}
.track-strip{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:5px}
.track-strip button{border:1px solid var(--line);border-radius:8px;background:white;min-height:42px;font:inherit;font-size:12px;font-weight:900;color:var(--ink)}
.track-strip button.selected{background:var(--blue);border-color:var(--blue);color:white}
.track-captions{display:flex;justify-content:space-between;gap:12px;color:var(--muted);font-size:11px;font-weight:800;margin-top:6px}
.action-choice{display:flex;flex-direction:column;gap:8px;min-height:118px;border:1px solid var(--line);border-radius:8px;background:#fffaf0;color:var(--ink);padding:12px;text-align:left;font:inherit}
.action-choice.selected{box-shadow:0 0 0 2px rgba(24,33,58,.14);border-color:var(--blue)}
.action-choice.ready{background:#f6fbf8}
.action-choice.check{background:#fffaf0}
.action-choice.blocked{background:#fff4f4;opacity:.76}
.action-choice-head{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;font-weight:900;line-height:1.15}
.citation{color:var(--muted);font-size:12px;font-weight:850}
.action-detail{border:1px solid var(--line);border-radius:8px;background:white;padding:14px;margin-top:14px}
.action-detail.ready{border-top:5px solid var(--green)}
.action-detail.check{border-top:5px solid var(--gold)}
.action-detail.blocked{border-top:5px solid var(--red)}
.detail-grid{display:grid;gap:12px;margin-top:12px}
.priority-row{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px}
.priority-row span,.mini-rule{border:1px solid var(--line);border-radius:8px;background:#fffaf0;padding:10px;font-size:13px;line-height:1.35}
.priority-row span.selected{background:#eef1f7;border-color:var(--blue);box-shadow:0 0 0 2px rgba(24,33,58,.12)}
.bot-special{display:grid;gap:12px}
.bot-card-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:6px;margin-bottom:10px}
.bot-card-grid button{border:1px solid var(--line);border-radius:8px;background:white;color:var(--ink);min-height:48px;padding:7px;font:inherit;text-align:left}
.bot-card-grid button.selected{background:var(--blue);border-color:var(--blue);color:white}
.bot-card-grid strong,.bot-card-grid span{display:block;line-height:1.1}
.bot-card-grid span{font-size:11px;color:var(--muted);margin-top:3px}
.bot-card-grid button.selected span{color:#dbeafe}
.bot-card-preview{display:grid;grid-template-columns:96px 1fr;gap:10px;align-items:start;margin-top:8px}
.bot-card-preview img{width:96px;border:1px solid var(--line);border-radius:8px;background:white}
.die-strip{display:grid;grid-template-columns:repeat(6,minmax(0,1fr));gap:6px}
.die-input{max-width:110px;margin-bottom:0}
.rule-list{margin:0;padding-left:20px;color:var(--muted);font-size:14px;line-height:1.45}
.rule-list li{margin:4px 0}
.warn-box{border:1px solid #ddb2b2;border-radius:8px;background:#fff4f4;margin-top:12px;padding:10px;color:var(--ink)}
.warn-box.soft{border-color:#e8c771;background:#fff8e8}
.slot-actions{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px;margin-top:12px}
.save-note{margin:12px 0}
.small-note{color:var(--muted);font-size:13px;line-height:1.35;margin-top:10px}
.faction-tabs{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px}
.faction-tab{min-height:46px}
.faction-tab.selected{box-shadow:0 0 0 2px rgba(24,33,58,.16)}
.faction-tab.coalition{background:#f8e8b7}
.faction-tab.kpd{background:#f7d0d0}
.faction-tab.nsdap{background:#ecd8c6}
.faction-tab.radcon{background:#e1e1e1}
.pill-list{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}
.pill-list span{border:1px solid var(--line);border-radius:999px;background:#fffaf0;padding:7px 10px;font-size:13px;font-weight:850}
.note-list{display:grid;gap:10px}
.note-list.compact{gap:8px}
.note-item{border:1px solid var(--line);border-radius:8px;background:#fffaf0;padding:12px;color:var(--muted);line-height:1.4}
.sticky-actions{position:sticky;bottom:10px;z-index:8;display:grid;grid-template-columns:repeat(auto-fit,minmax(72px,1fr));gap:6px;background:rgba(246,242,234,.92);backdrop-filter:blur(8px);border:1px solid var(--line);border-radius:8px;padding:6px;box-shadow:0 6px 18px rgba(29,36,48,.14)}
.sticky-actions .btn{min-height:38px;padding:8px 9px;text-align:center;font-size:13px}
.result{border-top:5px solid var(--green)}
@media (max-width:560px){
  .wrap{padding:12px}
  .hero,.turn-panel,.source-panel,.progress-strip{display:none}
  h1{font-size:25px}
  .panel{padding:12px;margin-bottom:10px}
  .topin{padding:9px 12px}
  .title{font-size:12px}
  .mobile-turn-summary{top:47px;margin-bottom:8px}
  .desktop-action-menu{display:none}
  .mobile-action-picker{display:block}
  .compact-action .badge{font-size:11px;min-height:22px;padding:3px 7px}
  .walk-block{margin-top:10px}
  .turn-page-head{margin:6px 0 10px}
  .turn-page-head h2{font-size:20px}
  .question-card{padding:10px}
  .option-card{min-height:74px;padding:10px}
  .section-head{margin-bottom:8px}
  .sequence-actions{margin-top:10px}
  .action-detail{padding:12px;margin-top:10px}
  .rule-list{font-size:13px}
  .note-item{padding:10px}
  .progress-strip{grid-template-columns:repeat(4,minmax(0,1fr));margin:8px 0 12px;gap:6px}
  .phase-dot{min-height:34px}
  .phase-dot small{display:none}
  .grid2,.grid4,.faction-tabs{grid-template-columns:1fr}
  .sticky-actions{grid-template-columns:repeat(4,minmax(0,1fr));bottom:6px}
  .sticky-actions .btn{font-size:12px;padding:7px 6px;min-height:36px}
  .option-grid,.action-slots,.context-grid,.action-card-grid,.board-state-grid,.controller-grid,.priority-row,.slot-actions,.turn-order-grid{grid-template-columns:1fr}
  .compact-action-list{max-height:230px;overflow:auto;padding:2px}
  .priority-row{display:flex;overflow:auto;padding-bottom:2px}
  .priority-row span{flex:0 0 72%}
  .bot-card-preview{grid-template-columns:78px 1fr}
  .bot-card-preview img{width:78px}
  .bot-step-strip{grid-template-columns:repeat(2,minmax(0,1fr))}
  .track-strip{grid-template-columns:repeat(7,minmax(42px,1fr));overflow:auto}
  .turn-rail{grid-template-columns:repeat(2,minmax(0,1fr));gap:6px}
  .turn-rail-item{padding:7px}
  .turn-rail-item .turn-order-label{width:24px;height:24px;font-size:12px}
  .turn-aid-details{margin-top:10px}
  .timeline{grid-template-columns:repeat(3,minmax(0,1fr))}
  .section-head{display:block}
  .badge-stack{justify-content:flex-start;margin-top:10px}
  .link-btn{margin-top:10px;width:100%}
}
</style>
</head>
<body>
<div class="app">
  <div class="top"><div class="topin">
    <button class="iconbtn" id="backBtn" aria-label="Back">&lt;</button>
    <div class="title">The Weimar Republic Companion</div>
    <button class="iconbtn" id="resetBtn" aria-label="Reset">R</button>
  </div></div>
  <main class="wrap" id="app"></main>
</div>
<script src="app.js"></script>
</body>
</html>
